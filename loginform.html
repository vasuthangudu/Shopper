<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script>
        function button(){
            
            var useremail=document.getElementById("textmail").value;
            var userpassword=document.getElementById("textpassword").value;
            fetch("/data/logion.json")
            .then(function(responce){
                return responce.json();
            })
            .then(function(users){
                for(var user of users){
                    if(user.Email==useremail && user.Password==userpassword ){
                       window.location="index.html"
                    }else{
                        document.querySelector("p").innerHTML="Email and password wrong".fontcolor('black');
                    }
                }
            })
        }
    </script>
    <style>
        div{
         
        width: 350px;
        height: 350px;
        background-color:gray;
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        margin: auto;
       
        }

        div:hover{
            width: 400px;
            height: 400px;

        }
        label{
            color: cyan;
            font-size: 30px;
        }

        input{
            width: 270px;
            height: 50px;
        }
      
         

        *{
            
            background-image: url("https://media.istockphoto.com/id/1722712516/photo/blurred-shadow-from-palm-leaves-on-the-light-blue-wall-minimal-abstract-studio-background-for.webp?b=1&s=612x612&w=0&k=20&c=DitNIjUo7Kf7gerAQbyHhffWwbsPTtDaFz1Y8rV83XM=");
            background-repeat: no-repeat;
            background-size: cover;
        }
        #main{
            background-position: center center;
        
        }
        
      
    </style>
</head>
<body>
    <div id="main" class="mt-4">
        <label>login Form</label>
        <br>
        <br>
        <dl>
            <dt><input type="email"  class="form-control" placeholder="Email" id="textmail"></dt>
            <br>
            <dt><input  type="password" class="form-control" placeholder="Password" id="textpassword"></dt>
            
        </dl>
        <button class=" btn btn-primary"  onclick="button()">SIGN IN</button>
        <p></p>
    </div>
</body>
</html>
