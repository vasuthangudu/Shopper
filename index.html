    <script>

        function selectcategory(){
            fetch("https://fakestoreapi.com/products/categories")
            .then(function(responce){
                return responce.json();
            })
            .then(function(categories){
                categories.unshift("all");
                for(var Category of categories){
                    var option=document.createElement("option");
                    option.text=Category.toUpperCase();
                    option.value=Category;
                    document.querySelector("select").appendChild(option);
                }
            })
        }
  

       function mainload(url){
        fetch(url)
        .then(function(response){
            return response.json();
        })
        .then(function(products){
            document.querySelector("main").innerHTML="";
            for(var product of products){
                var div=document.createElement("div");
                div.className="card m-3 p-3";
                div.style.width="300px";
              
                div.innerHTML=`
                <img src=${product.image}  class="card-ing-top" width="200px" height="200px">
                 <div>
                    <div class=" card-header">
                    <dd>${product.title}<dd>
                    </div>
                    <div class="card-body">
                    <dt>Price</dt>
                    <dd>${product.price}</dd>
                    <dt>Rating</dt>
                    <dd>${product.rating.rate}[${product.rating.count}]</dd>
                    </div>
                    <div class="card-fotor">
                    <button onclick=addclick(${product.id}) class="btn btn-danger"><span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart" viewBox="0 0 16 16">
  <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
</svg></span> Add to cart </button>
                    </div>
                </div>
                `;
                document.querySelector("main").appendChild(div);
            }
        })

       }

      function bodyload(){
        selectcategory();
        mainload("https://fakestoreapi.com/products/");
        categorychange();
        maincort();
        showclick();
       
      }

      
      function categorychange(){
        var pos=document.querySelector("select").value;
        if(pos=="all"){
            mainload("https://fakestoreapi.com/products/");
        }else
        mainload(`https://fakestoreapi.com/products/category/${pos}`);
      }

      function NavClicked(pos) {
       
    if (pos == "all") {
        mainload("https://fakestoreapi.com/products/");
    } else {
        mainload(`https://fakestoreapi.com/products/category/${pos}`);
    }
}


       var productiteam=[];
       function cartitems(){
        document.getElementById("lblcount").innerHTML=productiteam.length;
       }

      function addclick(id){
        fetch(`https://fakestoreapi.com/products/${id}`)
        .then(function(responce){
            return responce.json();
        })
        .then(function(items){
            productiteam.push(items)
            alert(`${items.title}\n Add your cart`);
            cartitems();
        })
      }

    function showclick() {
    document.querySelector("tbody").innerHTML = "";
    for (var items of productiteam) {
        var tr = document.createElement("tr");
        var trname = document.createElement("td");
        var trprice = document.createElement("td");
        var trpick = document.createElement("td");

        trname.innerHTML = items.title;
        trprice.innerHTML = items.price;
        trpick.innerHTML = `<img src="${items.image}" width="50px" height="50px">`;

        tr.appendChild(trname);
        tr.appendChild(trprice);
        tr.appendChild(trpick);

        document.querySelector("tbody").appendChild(tr);
    }
}
